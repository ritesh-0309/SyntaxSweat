<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login and Sign Up Form using HTML CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  font-family: Arial, Helvetica, sans-serif;
  color: #ffffff;
  overflow: hidden;
}
.auth-container
{
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 0 30px rgba(0,255,255,0.3);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: pulse 6s infinite;
}
@keyframes pulse
{
  0%
  {
    transform: scale(1);
  }
  50%
  {
    transform: scale(1.02);
  }
  100%
  {
    transform: scale(1);
  }
}
.tabs
{
  display: flex;
  margin-bottom: 30px;
}
.tab
{
  background: transparent;
  border: 2px solid #00ffff;
  color: #00ffff;
  padding: 12px 24px;
  margin: 0 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: bold;
  font-size: 1.1rem;
}
.tab:hover
{
  background: #00ffff;
  color: #0a0a2a;
  box-shadow: 0 0 10px #00ffff;
}
.tab.active
{
  background: #00ffff;
  color: #0a0a2a;
  box-shadow: 0 0 15px #00ffff;
}
.form
{
  display: flex;
  flex-direction: column;
  width: 280px;
}
.form h2
{
  text-align: center;
  margin-bottom: 24px;
  font-size: 1.8rem;
  color: #00ffff;
}
.form input
{
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 20px;
  color: #ffffff;
  font-size: 1rem;
  outline: none;
  transition: background 0.3s ease;
}
.form input::placeholder
{
  color: #a0a0a0;
}
.form input:focus
{
  background: rgba(255,255,255,0.2);
  box-shadow: 0 0 8px #00ffff;
}
.form button
{
  background: #ff00ff;
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: #0a0a2a;
  font-weight: bold;
  font-size: 1.1rem;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.form button:hover
{
  transform: scale(1.05);
  box-shadow: 0 0 12px #ff00ff;
}
.hidden
{
  display: none;
}
    </style>
</head>
<body>
<div class="auth-container">
  <div class="tabs">
    <button class="tab active" data-tab="login">Login</button>
    <button class="tab" data-tab="signup">Sign Up</button>
  </div>
  <form class="form login-form">
    <h2>Welcome Back</h2>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <form class="form signup-form hidden">
    <h2>Create Account</h2>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>
</div>
</body>
</html>
