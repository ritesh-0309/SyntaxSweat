<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Toggle Switch using Pure HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a0a, #001122);
  font-family: Arial, Helvetica, sans-serif;
}

.toggle-switch {
  position: relative;
  display: inline-block;
  width: 80px;
  height: 44px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-switch .slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #222;
  border-radius: 22px;
  transition: background 0.4s;
  box-shadow: inset 0 0 10px #000;
}

.toggle-switch .slider::before {
  position: absolute;
  content: "";
  height: 36px;
  width: 36px;
  left: 4px;
  top: 4px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.4s, background 0.4s;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  animation: pulse 2s infinite;
}

.toggle-switch input:checked + .slider {
  background: linear-gradient(45deg, #00ffff, #ff00ff);
}

.toggle-switch input:checked + .slider::before {
  transform: translateX(36px);
  background: #fff;
  box-shadow: 0 0 12px #00ffff;
}

.toggle-switch .slider:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #00ffff;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0px #00ffff; }
  50% { box-shadow: 0 0 12px #00ffff; }
  100% { box-shadow: 0 0 0px #00ffff; }
}
    </style>
</head>
<body>
<label class="toggle-switch">
  <input type="checkbox">
  <span class="slider"></span>
</label>
</body>
</html>
