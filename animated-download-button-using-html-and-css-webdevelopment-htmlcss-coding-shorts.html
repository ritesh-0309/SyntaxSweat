<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Download Button using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
html
{
  height: 100%;
}
body
{
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0a0a, #001f3f);
}
.download-btn
{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px 40px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 1.5rem;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(45deg, #00ffff, #ff00ff);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
  box-shadow: 0 0 10px rgba(0,255,255,0.6);
  position: relative;
  overflow: hidden;
}
.download-btn::after
{
  content: "";
  position: absolute;
  left: -100%;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transform: skewX(-20deg);
}
.download-btn:hover
{
  transform: scale(1.07);
  box-shadow: 0 0 20px rgba(255,0,255,0.8);
}
.download-btn:active::after
{
  animation: slide 0.6s forwards;
}
@keyframes slide
{
  to
  {
    left: 100%;
  }
}
.download-btn
{
  animation: pulse 2s infinite;
}
@keyframes pulse
{
  0%
  {
    box-shadow: 0 0 10px rgba(0,255,255,0.6);
  }
  50%
  {
    box-shadow: 0 0 20px rgba(0,255,255,1);
  }
  100%
  {
    box-shadow: 0 0 10px rgba(0,255,255,0.6);
  }
}
.icon
{
  font-size: 2rem;
}
.text
{
  font-size: 1.5rem;
}
    </style>
</head>
<body>
<button class="download-btn"><span class="icon">⬇️</span><span class="text">Download</span></button>
</body>
</html>
