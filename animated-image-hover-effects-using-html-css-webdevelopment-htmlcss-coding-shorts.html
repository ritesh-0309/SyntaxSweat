<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Image Hover Effects using HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
html {
  height: 100vh;
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: linear-gradient(135deg, #0a0a2a, #001133);
}

.hover-card {
  width: 340px;
  max-width: 90%;
  background: linear-gradient(135deg, #111144, #224466);
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,255,255,0.6);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  color: #00ffff;
  position: relative;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: float 6s ease-in-out infinite;
}

.hover-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.hover-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,0,255,0.9);
}

.hover-card:hover::before {
  opacity: 1;
}

.image-box {
  width: 100%;
  height: 200px;
  background: linear-gradient(45deg, #ff00ff, #00ffff);
  border-bottom: 4px solid #00ffff;
  border-radius: 12px 12px 0 0;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.hover-card:hover .image-box {
  transform: scale(1.08);
  box-shadow: 0 0 20px #00ffff;
}

.hover-card h1 {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: bold;
  font-size: 2rem;
  margin: 1rem 0 0.5rem 0;
  color: #ff00ff;
  text-shadow: 0 0 8px #ff00ff;
}

.hover-card p {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: bold;
  font-size: 1rem;
  margin: 0 0 1rem 0;
  color: #00ffff;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}
    </style>
</head>
<body>
<div class="hover-card">
  <div class="image-box"></div>
  <h1>Animated Image Hover Effects</h1>
  <p>#webdevelopment #htmlcss #coding #shorts</p>
</div>
</body>
</html>
