<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Toggle Switch using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  background: linear-gradient(135deg, #0a0a2a, #001133);
}

.toggle
{
  position: relative;
  width: 80px;
  height: 44px;
}

.toggle input
{
  opacity: 0;
  width: 0;
  height: 0;
}

.slider
{
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #222;
  border-radius: 22px;
  transition: background 0.4s;
  box-shadow: inset 0 0 10px rgba(0,255,255,0.2);
}

.slider::before
{
  content: "";
  position: absolute;
  height: 36px;
  width: 36px;
  left: 4px;
  top: 4px;
  background: #00ffff;
  border-radius: 50%;
  transition: transform 0.4s;
  box-shadow: 0 0 8px #00ffff;
  animation: pulse 2s infinite;
}

.toggle input:checked + .slider
{
  background: #00ff99;
  box-shadow: inset 0 0 12px rgba(0,255,153,0.4);
}

.toggle input:checked + .slider::before
{
  transform: translateX(36px);
  background: #ff00ff;
  box-shadow: 0 0 12px #ff00ff;
}

.slider:hover
{
  transform: scale(1.02);
  box-shadow: 0 0 12px #00ffff;
}

@keyframes pulse
{
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}
    </style>
</head>
<body>
<div class="toggle">
  <input type="checkbox" id="toggle">
  <label for="toggle" class="slider"></label>
</div>
</body>
</html>
