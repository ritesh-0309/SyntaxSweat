<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Toggle Switch using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
}

.toggle-wrapper
{
  position: relative;
}

#toggle
{
  appearance: none;
  -webkit-appearance: none;
  width: 0;
  height: 0;
  position: absolute;
  opacity: 0;
}

.toggle-label
{
  display: inline-block;
  width: 80px;
  height: 40px;
  background: #222;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
  transition: background 0.4s ease;
  transition: box-shadow 0.4s ease;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
  animation: pulse 2s infinite;
}

.toggle-label::after
{
  content: "";
  position: absolute;
  top: 4px;
  left: 4px;
  width: 32px;
  height: 32px;
  background: #00ffff;
  border-radius: 50%;
  transition: transform 0.4s ease;
  transition: background 0.4s ease;
  box-shadow: 0 0 8px #00ffff;
}

#toggle:checked + .toggle-label
{
  background: #ff00ff;
  box-shadow: 0 0 15px rgba(255,0,255,0.6);
}

#toggle:checked + .toggle-label::after
{
  transform: translateX(40px);
  background: #ffff00;
  box-shadow: 0 0 8px #ffff00;
}

.toggle-label:hover
{
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

@keyframes pulse
{
  0%
  {
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }
  50%
  {
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
  }
  100%
  {
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }
}

.toggle-text
{
  margin-top: 20px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 1.5rem;
  color: #fff;
  text-align: center;
  font-weight: bold;
}

@media (max-width: 480px)
{
  .toggle-label
  {
    width: 100px;
    height: 50px;
  }
  .toggle-label::after
  {
    width: 42px;
    height: 42px;
    top: 4px;
    left: 4px;
  }
  #toggle:checked + .toggle-label::after
  {
    transform: translateX(50px);
  }
}
    </style>
</head>
<body>
<div class="toggle-wrapper">
  <input type="checkbox" id="toggle">
  <label for="toggle" class="toggle-label"></label>
  <div class="toggle-text">Modern Toggle Switch</div>
</div>
</body>
</html>
