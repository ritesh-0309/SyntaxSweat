<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Toggle Switch using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  font-family: Arial, Helvetica, sans-serif;
}
.switch {
  position: relative;
  display: inline-block;
  width: 120px;
  height: 64px;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #111;
  border-radius: 34px;
  transition: background 0.4s;
  box-shadow: inset 0 0 10px rgba(0,255,255,0.3);
}
.slider:before {
  position: absolute;
  content: "";
  height: 56px;
  width: 56px;
  left: 4px;
  bottom: 4px;
  background: #00ffff;
  border-radius: 50%;
  transition: transform 0.4s;
  box-shadow: 0 0 15px #00ffff;
}
input:checked + .slider {
  background: #ff00ff;
}
input:checked + .slider:before {
  transform: translateX(56px);
  background: #ffff00;
  box-shadow: 0 0 15px #ffff00;
}
.slider:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffff;
}
@keyframes pulse {
  0% {
    box-shadow: 0 0 0px #00ffff;
  }
  50% {
    box-shadow: 0 0 15px #00ffff;
  }
  100% {
    box-shadow: 0 0 0px #00ffff;
  }
}
.slider {
  animation: pulse 2s infinite;
}
    </style>
</head>
<body>
<label class="switch">
  <input type="checkbox" />
  <span class="slider"></span>
</label>
</body>
</html>
