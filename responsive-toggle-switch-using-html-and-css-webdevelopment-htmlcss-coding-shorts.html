<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Toggle Switch using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0d0d2b, #1a1a3d);
  overflow: hidden;
}

.toggle-switch {
  position: relative;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.switch {
  display: block;
  width: 80px;
  height: 44px;
  background: #222;
  border-radius: 22px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0,255,255,0.2);
  transition: background 0.4s ease;
}

.switch::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 40px;
  height: 40px;
  background: #00ffff;
  border-radius: 20px;
  box-shadow: 0 0 8px #00ffff;
  transition: transform 0.4s ease;
}

.toggle-switch input:checked + .switch {
  background: #ff00ff;
  box-shadow: 0 0 16px rgba(255,0,255,0.4);
}

.toggle-switch input:checked + .switch::after {
  transform: translateX(36px);
  background: #ffff00;
  box-shadow: 0 0 12px #ffff00;
}

.switch:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

@keyframes pulse {
  0% { box-shadow: 0 0 8px rgba(0,255,255,0.3); }
  50% { box-shadow: 0 0 20px rgba(0,255,255,0.7); }
  100% { box-shadow: 0 0 8px rgba(0,255,255,0.3); }
}

.switch {
  animation: pulse 3s infinite;
}

    </style>
</head>
<body>
<div class="toggle-switch">
  <input type="checkbox" id="toggle" />
  <label for="toggle" class="switch"></label>
</div>
</body>
</html>
