<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Tooltip using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  font-family: Arial, Helvetica, sans-serif;
}

.tooltip {
  position: relative;
  background: #111;
  color: #00ffff;
  padding: 20px 30px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1.5rem;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 4px 12px rgba(0,255,255,0.3);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: pulse 3s infinite;
}

.tooltip:hover {
  transform: scale(1.07);
  box-shadow: 0 8px 24px rgba(0,255,255,0.6);
}

.tooltip::after {
  content: "";
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 8px;
  border-style: solid;
  border-color: transparent transparent #111 transparent;
}

.tooltip-text {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: #00ffff;
  color: #000;
  padding: 12px 16px;
  border-radius: 12px;
  white-space: nowrap;
  font-size: 1.2rem;
  font-weight: bold;
  box-shadow: 0 4px 12px rgba(0,255,255,0.4);
  transition: opacity 0.4s ease, visibility 0.4s;
}

.tooltip:hover .tooltip-text {
  visibility: visible;
  opacity: 1;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 8px rgba(0,255,255,0.5);
  }
  50% {
    box-shadow: 0 0 20px rgba(0,255,255,1);
  }
  100% {
    box-shadow: 0 0 8px rgba(0,255,255,0.5);
  }
}
    </style>
</head>
<body>
<div class="tooltip">
  Hover me
  <span class="tooltip-text">Pure CSS Tooltip</span>
</div>
</body>
</html>
