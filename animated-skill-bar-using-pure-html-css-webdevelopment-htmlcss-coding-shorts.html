<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skill Bar using Pure HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
html {
  height: 100%;
  margin: 0;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0a, #001f3f);
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}
.skill-container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.skill-container h1 {
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 2rem;
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff;
}
.skill-bar {
  position: relative;
  height: 30px;
  margin: 1rem 0;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
}
.skill-bar::before {
  content: attr(data-skill);
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 4px #fff;
}
.skill-bar::after {
  content: attr(data-percent) "%";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 4px #fff;
}
.fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffff, #ff00ff);
  border-radius: 12px;
  box-shadow: 0 0 12px #00ffff;
  transition: width 1.5s ease-out;
}
.skill-bar:hover .fill {
  transform: scaleY(1.1);
  box-shadow: 0 0 20px #ff00ff;
}
@keyframes pulse {
  0% {
    box-shadow: 0 0 8px #00ffff;
  }
  50% {
    box-shadow: 0 0 20px #ff00ff;
  }
  100% {
    box-shadow: 0 0 8px #00ffff;
  }
}
.fill {
  animation: pulse 3s infinite;
}
.skill-bar .fill {
  width: var(--level);
}

    </style>
</head>
<body>
<div class="skill-container">
  <h1>Animated Skill Bar</h1>
  <div class="skill-bar" data-skill="HTML" data-percent="90" style="--level:90%">
    <div class="fill"></div>
  </div>
  <div class="skill-bar" data-skill="CSS" data-percent="85" style="--level:85%">
    <div class="fill"></div>
  </div>
  <div class="skill-bar" data-skill="JavaScript" data-percent="75" style="--level:75%">
    <div class="fill"></div>
  </div>
</div>
</body>
</html>
