<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light and Dark Mode Toggle Animation #htmlcss #coding</title>
    <style>
html
{
  height: 100vh;
  margin: 0;
}
body
{
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  background: linear-gradient(135deg, #0a0a2a, #001133);
}
.mode-toggle
{
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.toggle
{
  width: 120px;
  height: 60px;
  background: linear-gradient(135deg, #00ffff, #ff00ff);
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,255,255,0.6);
  position: relative;
  transition: background 0.4s ease;
  transition: box-shadow 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 5px;
}
.toggle::before
{
  content: "";
  width: 50px;
  height: 50px;
  background: #ffeb3b;
  border-radius: 50%;
  box-shadow: 0 0 10px #ffeb3b;
  transition: transform 0.4s ease;
  transform: translateX(0);
}
.toggle::after
{
  content: "";
  position: absolute;
  top: 5px;
  left: 5px;
  width: 50px;
  height: 50px;
  background: radial-gradient(circle at 30% 30%, #ffffff 40%, transparent 60%);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.mode-toggle:checked + .toggle
{
  background: linear-gradient(135deg, #ff6600, #ff0066);
  box-shadow: 0 0 20px rgba(255,102,0,0.8);
  justify-content: flex-end;
}
.mode-toggle:checked + .toggle::before
{
  transform: translateX(60px);
}
.mode-toggle:checked + .toggle::after
{
  opacity: 1;
}
.toggle:hover
{
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,255,255,0.8);
}
@keyframes pulse
{
  0%
  {
    box-shadow: 0 0 0 0 rgba(255,255,255,0.4);
  }
  70%
  {
    box-shadow: 0 0 0 10px rgba(255,255,255,0);
  }
  100%
  {
    box-shadow: 0 0 0 0 rgba(255,255,255,0);
  }
}
.toggle
{
  animation: pulse 2s infinite;
}
    </style>
</head>
<body>
<input type="checkbox" id="theme-toggle" class="mode-toggle">
<label for="theme-toggle" class="toggle" aria-label="Toggle light and dark mode"></label>
</body>
</html>
