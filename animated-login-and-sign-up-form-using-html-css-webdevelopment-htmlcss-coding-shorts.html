<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login and Sign Up Form using HTML CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

.auth-container
{
  width: 360px;
  background: rgba(20,20,40,0.9);
  border-radius: 16px;
  padding: 40px 30px;
  box-shadow: 0 0 30px rgba(0,255,255,0.3);
  position: relative;
  animation: pulse 4s infinite;
}

@keyframes pulse
{
  0%
  {
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }
  50%
  {
    box-shadow: 0 0 40px rgba(0,255,255,0.5);
  }
  100%
  {
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }
}

.auth-container input[type="radio"]
{
  display: none;
}

.tabs
{
  display: flex;
  justify-content: space-around;
  margin-bottom: 30px;
}

.tab
{
  flex: 1;
  text-align: center;
  font-size: 1.2rem;
  font-weight: bold;
  color: #00ffff;
  cursor: pointer;
  padding: 10px 0;
  border-radius: 12px;
  transition: background 0.3s, color 0.3s, transform 0.3s;
}

#login:checked ~ .tabs label[for="login"],
#signup:checked ~ .tabs label[for="signup"]
{
  background: rgba(0,255,255,0.2);
  color: #ffffff;
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(0,255,255,0.7);
}

.forms
{
  position: relative;
  height: 260px;
  overflow: hidden;
}

.login-form,
.signup-form
{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  transition: transform 0.5s;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.login-form
{
  transform: translateX(0%);
}

#signup:checked ~ .forms .login-form
{
  transform: translateX(-100%);
}

.signup-form
{
  transform: translateX(100%);
}

#signup:checked ~ .forms .signup-form
{
  transform: translateX(0%);
}

input[type="text"],
input[type="email"],
input[type="password"]
{
  padding: 15px;
  font-size: 1.1rem;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #00ffff;
  outline: none;
  transition: background 0.3s, box-shadow 0.3s;
}

input::placeholder
{
  color: #66ffff;
}

input:focus
{
  background: rgba(255,255,255,0.2);
  box-shadow: 0 0 8px rgba(0,255,255,0.6);
}

button
{
  padding: 15px;
  font-size: 1.2rem;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #00ffff, #ff00ff);
  color: #000000;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

button:hover
{
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,0,255,0.8);
}
    </style>
</head>
<body>
<div class="auth-container">
  <input type="radio" name="auth" id="login" checked>
  <input type="radio" name="auth" id="signup">
  <div class="tabs">
    <label for="login" class="tab">Login</label>
    <label for="signup" class="tab">Sign Up</label>
  </div>
  <div class="forms">
    <form class="login-form">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <form class="signup-form">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>
</div>
</body>
</html>
