<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Animated Input Label using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  font-family: Arial, Helvetica, sans-serif;
}

.input-group {
  position: relative;
  width: 320px;
}

.animated-input {
  width: 100%;
  padding: 16px 14px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: #00ffff;
  font-size: 1.2rem;
  outline: none;
  transition: all 0.4s ease;
  box-shadow: 0 0 8px rgba(0,255,255,0.3);
  animation: pulse 3s infinite;
}

.animated-input::placeholder {
  color: transparent;
}

.animated-label {
  position: absolute;
  left: 16px;
  top: 16px;
  color: #cccccc;
  pointer-events: none;
  transition: all 0.4s ease;
  background: transparent;
}

.animated-input:focus + .animated-label,
.animated-input:not(:placeholder-shown) + .animated-label {
  top: -12px;
  left: 12px;
  font-size: 0.9rem;
  color: #00ffff;
  background: #0a0a2a;
  padding: 0 4px;
}

.animated-input:focus {
  box-shadow: 0 0 12px rgba(0,255,255,0.8);
  transform: scale(1.02);
}

.input-group:hover .animated-input {
  box-shadow: 0 0 16px rgba(255,0,255,0.6);
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 8px rgba(0,255,255,0.3);
  }
  50% {
    box-shadow: 0 0 12px rgba(0,255,255,0.6);
  }
  100% {
    box-shadow: 0 0 8px rgba(0,255,255,0.3);
  }
}
    </style>
</head>
<body>
<div class="input-group">
  <input type="text" id="name" class="animated-input" required />
  <label for="name" class="animated-label">Your Name</label>
</div>
</body>
</html>
