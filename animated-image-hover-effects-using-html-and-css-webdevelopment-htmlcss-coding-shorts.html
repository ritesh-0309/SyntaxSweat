<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Image Hover Effects using HTML and CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body {
  height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0a0a, #001f3f);
  overflow: hidden;
}

.image-card {
  width: 320px;
  height: 240px;
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.4s ease;
  transition: box-shadow 0.4s ease;
  animation: float 6s ease-in-out infinite;
}

.image-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px 5px #00ffff;
}

.image {
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
  background-size: 300% 300%;
  animation: gradientShift 8s ease infinite;
  border-radius: 16px;
}

.image-card .caption {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px;
  background: rgba(0, 0, 0, 0.6);
  color: #00ffff;
  font-family: Arial, Helvetica, sans-serif;
  font-weight: bold;
  text-align: center;
  font-size: 1.2rem;
  backdrop-filter: blur(4px);
  transition: background 0.3s ease;
}

.image-card:hover .caption {
  background: rgba(0, 0, 0, 0.8);
}

@keyframes gradientShift {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

@keyframes float {
  0% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
  100% {
    transform: translateY(0);
  }
}
    </style>
</head>
<body>
<div class="image-card">
  <div class="image"></div>
  <div class="caption">Animated Image Hover Effects</div>
</div>
</body>
</html>
