<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Social Icons Hover Effects Using HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body\n{\n  margin: 0;\n  height: 100vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: linear-gradient(135deg, #0a0a2a, #001122);\n  font-family: Arial, Helvetica, sans-serif;\n  color: #fff;\n}\n\n.social-icons\n{\n  display: flex;\n  gap: 30px;\n}\n\n.icon\n{\n  width: 80px;\n  height: 80px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 36px;\n  font-weight: bold;\n  color: #fff;\n  background: linear-gradient(45deg, #ff00ff, #00ffff);\n  border-radius: 12px;\n  text-decoration: none;\n  transition: transform 0.4s;\n  transition: box-shadow 0.4s;\n  transition: background 0.4s;\n  animation: pulse 3s infinite;\n}\n\n.icon:hover\n{\n  transform: scale(1.2);\n  box-shadow: 0 0 20px #00ffff;\n  background: linear-gradient(45deg, #00ffff, #ff00ff);\n}\n\n@keyframes pulse\n{\n  0%\n  {\n    transform: scale(1);\n  }\n  50%\n  {\n    transform: scale(1.05);\n  }\n  100%\n  {\n    transform: scale(1);\n  }\n}\n
    </style>
</head>
<body>
<div class=\"social-icons\">\n  <a href=\"#\" class=\"icon facebook\">F</a>\n  <a href=\"#\" class=\"icon twitter\">T</a>\n  <a href=\"#\" class=\"icon instagram\">I</a>\n  <a href=\"#\" class=\"icon linkedin\">L</a>\n  <a href=\"#\" class=\"icon youtube\">Y</a>\n</div>
</body>
</html>
