<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form using HTML CSS JS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a0a, #001133);
  font-family: Arial, Helvetica, sans-serif;
  color: #ffffff;
}

.login-container
{
  background: rgba(10,10,10,0.8);
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: float 6s ease-in-out infinite;
}

@keyframes float
{
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

h2
{
  margin: 0 0 20px 0;
  font-size: 2rem;
  font-weight: bold;
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff;
}

input
{
  width: 280px;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 12px;
  background: #111;
  color: #fff;
  font-size: 1rem;
  outline: none;
  box-shadow: inset 0 0 5px #00ffff;
  transition: box-shadow 0.3s;
}

input:focus
{
  box-shadow: inset 0 0 8px #ff00ff;
}

.login-button
{
  width: 300px;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #00ffff, #ff00ff);
  color: #000;
  font-size: 1.2rem;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px #00ffff;
  transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
}

.login-button:hover
{
  transform: scale(1.05);
  background: linear-gradient(45deg, #ff00ff, #ffff00);
  box-shadow: 0 0 15px #ffff00;
}
    </style>
</head>
<body>
<div class="login-container">
  <h2>Animated Login</h2>
  <form>
    <input type="text" placeholder="Username" required />
    <input type="password" placeholder="Password" required />
    <button type="submit" class="login-button">Login</button>
  </form>
</div>
</body>
</html>
