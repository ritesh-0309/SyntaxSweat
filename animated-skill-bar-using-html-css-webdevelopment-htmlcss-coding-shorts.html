<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skill Bar using HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #0a0a0a, #111111);
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

.skill
{
  text-align: center;
  max-width: 90%;
}

.skill-label
{
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 1rem;
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff;
}

.skill-bar
{
  position: relative;
  width: 100%;
  height: 2.5rem;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
  transition: box-shadow 0.3s ease;
}

.skill-bar:hover
{
  transform: scale(1.02);
  box-shadow: 0 0 12px #ff00ff;
}

.skill-fill
{
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffff, #ff00ff);
  border-radius: 12px;
  box-shadow: 0 0 12px #00ffff;
  animation: fillSkill 2s forwards, pulse 3s 2s infinite;
  transition: width 0.6s ease;
}

@keyframes fillSkill
{
  from
  {
    width: 0%;
  }
  to
  {
    width: 90%;
  }
}

@keyframes pulse
{
  from
  {
    box-shadow: 0 0 12px #00ffff;
  }
  to
  {
    box-shadow: 0 0 24px #ff00ff;
  }
}
    </style>
</head>
<body>
<div class="skill">
  <div class="skill-label">HTML & CSS</div>
  <div class="skill-bar">
    <div class="skill-fill"></div>
  </div>
</div>
</body>
</html>
