<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skill Bar using HTML & CSS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: linear-gradient(135deg, #0a0a0a, #001f3f);
}

.skill-bar
{
  text-align: center;
  color: #00ffff;
  font-family: Arial, Helvetica, sans-serif;
}

.skill-bar h1
{
  font-size: 2.5rem;
  font-weight: bold;
  margin-bottom: 1rem;
  text-shadow: 0 0 10px #00ffff;
}

.bar
{
  width: 80vw;
  max-width: 500px;
  height: 30px;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 10px #00ffff;
  margin: 0 auto;
  position: relative;
}

.fill
{
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #ff00ff);
  width: 0%;
  border-radius: 15px;
  animation: fillBar 2s forwards;
  box-shadow: 0 0 15px #ff00ff;
}

@keyframes fillBar
{
  to
  {
    width: 85%;
  }
}

.percentage
{
  display: block;
  margin-top: 0.5rem;
  font-size: 1.5rem;
  color: #ffff00;
  text-shadow: 0 0 8px #ffff00;
  animation: pulse 2s infinite;
}

@keyframes pulse
{
  0%
  {
    opacity: 0.8;
  }
  50%
  {
    opacity: 1;
  }
  100%
  {
    opacity: 0.8;
  }
}

.skill-bar:hover .fill
{
  transform: scaleX(1.05);
  transition: transform 0.3s ease;
}

.skill-bar:hover h1
{
  color: #ff00ff;
  text-shadow: 0 0 15px #ff00ff;
  transition: color 0.3s ease, text-shadow 0.3s ease;
}
    </style>
</head>
<body>
<div class="skill-bar">
  <h1>Animated Skill Bar</h1>
  <div class="bar">
    <div class="fill"></div>
  </div>
  <span class="percentage">85%</span>
</div>
</body>
</html>
