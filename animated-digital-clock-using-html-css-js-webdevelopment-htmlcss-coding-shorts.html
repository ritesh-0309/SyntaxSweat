<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Digital Clock using HTML CSS JS #webdevelopment #htmlcss #coding #shorts</title>
    <style>
body
{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a0a2a, #001133);
  overflow: hidden;
}
.clock
{
  position: relative;
  background: rgba(0, 255, 255, 0.1);
  padding: 30px 40px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,255,255,0.6);
  transition: transform 0.4s ease;
  transition: box-shadow 0.4s ease;
}
.clock:hover
{
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(0,255,255,0.9);
}
.time
{
  font-family: Arial, Helvetica, sans-serif;
  font-size: 4rem;
  font-weight: bold;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff;
  letter-spacing: 4px;
}
.colon
{
  animation: blink 1s steps(1) infinite;
}
@keyframes blink
{
  0%
  {
    opacity: 1;
  }
  50%
  {
    opacity: 0;
  }
  100%
  {
    opacity: 1;
  }
}
.clock::after
{
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  box-shadow: inset 0 0 30px rgba(255,0,255,0.3);
  pointer-events: none;
  animation: pulse 3s infinite;
}
@keyframes pulse
{
  0%
  {
    box-shadow: inset 0 0 20px rgba(255,0,255,0.2);
  }
  50%
  {
    box-shadow: inset 0 0 30px rgba(255,0,255,0.5);
  }
  100%
  {
    box-shadow: inset 0 0 20px rgba(255,0,255,0.2);
  }
}
    </style>
</head>
<body>
<div class="clock">
  <div class="time">
    12<span class="colon">:</span>34<span class="colon">:</span>56
  </div>
</div>
</body>
</html>
